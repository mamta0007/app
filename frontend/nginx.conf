server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: if the requested path isn't a real file or folder
    # on disk (e.g. /activate?token=... or /reset-password?token=...),
    # serve index.html instead of 404ing. index.html + app.js then
    # read the path/query string themselves and decide what to show.
    # This mirrors what serve.py's SPARequestHandler did for local dev.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional but recommended: static assets (JS/CSS/images) can be
    # cached aggressively since they're versioned by deploy, while
    # index.html itself should NOT be cached — otherwise browsers may
    # keep serving a stale index.html after you deploy a fix (this is
    # exactly the "browser showed the old file" issue from earlier).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
